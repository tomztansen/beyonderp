# ====================================================================
# Profil DEVELOPMENT — aktifkan dengan: --spring.profiles.active=dev
# Override pengaturan production agar development lebih nyaman.
# ====================================================================

# Hibernate boleh auto-update skema di development (diubah ke validate agar aman dari error perubahan tipe data)
spring.jpa.hibernate.ddl-auto=validate

# Tampilkan SQL di console untuk debugging
spring.jpa.show-sql=true
