spring.application.name=vaadinerp
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/vaadinerp?currentSchema=public,dynamic
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Konfigurasi HikariCP Connection Pool (Anti Connection-Closed & Auto-Keepalive) ---
spring.datasource.hikari.pool-name=VaadinErpHikariPool
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
# Waktu maksimal menunggu koneksi tersedia dari pool (30 detik)
spring.datasource.hikari.connection-timeout=30000
# Waktu maksimal koneksi boleh diam (idle) di dalam pool sebelum ditutup (10 menit)
spring.datasource.hikari.idle-timeout=600000
# Waktu hidup maksimal koneksi sebelum didaur ulang oleh Hikari (28 menit, mencegah diputus sepihak oleh firewall/Postgres yang rata-rata 30 menit)
spring.datasource.hikari.max-lifetime=1680000
# PENTING: Aktifkan Keepalive agar koneksi secara berkala diping/dites saat malam hari / idle (setiap 3 menit)
spring.datasource.hikari.keepalive-time=180000
# Auto-validasi sebelum koneksi diberikan ke aplikasi (5 detik)
spring.datasource.hikari.validation-timeout=5000

# Production-safe: 'validate' hanya memvalidasi skema tanpa mengubahnya.
# Untuk development, gunakan profil dev: java -jar app.jar --spring.profiles.active=dev
# atau buat file application-dev.properties dengan spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

vaadin.whitelisted-packages=com.vaadin,org.vaadin,com.vaadinerp
vaadin.react.enable=false
vaadin.sendUrls=false
vaadin.devmode.stats.enable=false

# --- Konfigurasi Session & Timeout Keamanan ---
# Batas waktu tidak aktif (idle) sebelum sesi HTTP kedaluwarsa (30 menit)
server.servlet.session.timeout=30m
# PENTING: Paksa Vaadin menutup sesi yang idle & mengabaikan ping heartbeat browser
vaadin.closeIdleSessions=true
# Interval pengecekan koneksi browser ke server (detik)
vaadin.heartbeatInterval=180

# --- Konfigurasi File Upload ---
app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
# Nonaktifkan audit untuk proses INSERT
app.audit.insert.enabled=false
# Nonaktifkan audit untuk proses UPDATE
app.audit.update.enabled=false
# (Opsional) Jika ingin mematikan SELURUH audit (Insert/Update/Delete sekaligus)
app.seed-data.enabled=false

# --- Konfigurasi Spring Boot Actuator Logfile (Web Log Streaming) ---
logging.file.name=logs/server.log
management.endpoints.web.exposure.include=health,info,logfile
vaadin.excludeUrls=/actuator/**
