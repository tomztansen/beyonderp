spring.application.name=vaadinerp
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/vaadinerp?currentSchema=public,dynamic
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

vaadin.whitelisted-packages=com.vaadin,org.vaadin,com.vaadinerp
vaadin.react.enable=false
vaadin.sendUrls=false
vaadin.devmode.stats.enable=false

